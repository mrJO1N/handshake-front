<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="bg" cx="70%" cy="10%" r="120%">
      <stop offset="0%" stop-color="#17337A"></stop>
      <stop offset="60%" stop-color="#0C1E4C"></stop>
      <stop offset="100%" stop-color="#081431"></stop>
    </radialGradient>
    <radialGradient id="glow" cx="28%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#4D9BFF" stop-opacity="0.40"></stop>
      <stop offset="100%" stop-color="#4D9BFF" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"></stop>
      <stop offset="8%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <clipPath id="squircle">
